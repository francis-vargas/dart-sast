rules:
  - id: DART-SEC-001
    title: Hardcoded Secret or Credential
    message: >
      A potential secret, API key, password, or token was found hardcoded in
      source code. Hardcoded credentials are exposed in version control and can
      be extracted from compiled binaries.
    severity: CRITICAL
    metadata:
      cwe: CWE-798
      owasp: "A07:2021 – Identification and Authentication Failures"
      tags: [secrets, credentials, hardcoded]
    suggestion: >
      Store secrets in environment variables, flutter_dotenv, or a secrets
      manager. Never commit credentials to version control.
    pattern:
      regex: >-
        (?i)(api[_-]?key|secret[_-]?key|password|passwd|token|auth[_-]?token|
        access[_-]?key|private[_-]?key|client[_-]?secret)\s*=\s*["'][^"']{6,}["']
    languages: [dart, yaml]

  - id: DART-SEC-006
    title: Sensitive Data Logged
    message: >
      A logging call (print / debugPrint / log) references what appears to be
      a sensitive variable (password, token, secret, key, credential).
    severity: MEDIUM
    metadata:
      cwe: CWE-532
      owasp: "A09:2021 – Security Logging and Monitoring Failures"
      tags: [logging, sensitive-data]
    suggestion: >
      Never log sensitive user data. Sanitize log output and use structured
      logging with log levels disabled in production.
    pattern:
      regex: >-
        \b(print|debugPrint|log)\s*\(.*\b(password|passwd|token|secret|apikey|credential)\b
      flags: IGNORECASE
    languages: [dart]

  - id: DART-SEC-008
    title: Sensitive Data Stored in SharedPreferences
    message: >
      SharedPreferences stores data in plaintext on the device filesystem.
      Storing secrets here exposes them to rooted/jailbroken devices.
    severity: HIGH
    metadata:
      cwe: CWE-312
      owasp: "A02:2021 – Cryptographic Failures"
      tags: [storage, sensitive-data, android, ios]
    suggestion: >
      Use flutter_secure_storage (backed by Keychain / Keystore) for sensitive
      data. Reserve SharedPreferences for non-sensitive preferences only.
    pattern:
      regex: >-
        SharedPreferences.*\.(setString|setInt|setBool)\s*\(.*\b(password|token|secret|key)\b
      flags: IGNORECASE
    languages: [dart]