rules:
  - id: DART-SEC-005
    title: Potential SQL Injection
    message: >
      String interpolation or concatenation was detected inside a SQL query
      string. This pattern can allow attackers to manipulate query logic,
      extract data, or execute arbitrary commands.
    severity: CRITICAL
    metadata:
      cwe: CWE-89
      owasp: "A03:2021 – Injection"
      tags: [injection, sql, database]
    suggestion: >
      Use parameterized queries / prepared statements provided by sqflite or
      your ORM. Never interpolate user-controlled data directly into SQL strings.
    pattern:
      regex: (rawQuery|execute|query)\s*\(\s*["'].*\$\{?[a-zA-Z_]\w*\}?.*["']
    languages: [dart]

  - id: DART-SEC-010
    title: Potential Path Traversal
    message: >
      User-controlled input is interpolated directly into a file path. This
      can allow attackers to read or write arbitrary files on the device,
      including sensitive app data and system files.
    severity: HIGH
    metadata:
      cwe: CWE-22
      owasp: "A01:2021 – Broken Access Control"
      tags: [injection, path-traversal, filesystem]
    suggestion: >
      Validate and sanitize file path components. Use path.join() with an
      allowlisted base directory and reject components containing '..'.
    pattern:
      regex: (File|Directory|open)\s*\(\s*["'][^"']*\$\{?[a-zA-Z_]\w*\}?
    languages: [dart]

  - id: DART-SEC-011
    title: Exported Activity / Implicit Intent Data Exposure
    message: >
      Use of MethodChannel passing interpolated data without explicit component
      targeting can expose data to other apps via implicit intents.
    severity: MEDIUM
    metadata:
      cwe: CWE-926
      owasp: "A04:2021 – Insecure Design"
      tags: [android, intent, ipc, data-exposure]
    suggestion: >
      Always use explicit intents with package restriction. Avoid passing
      sensitive data through extras; prefer secure IPC or encrypted payloads.
    pattern:
      regex: MethodChannel\(.*\)\.invokeMethod\(.*\$\{?[a-zA-Z_]\w*\}?
    languages: [dart]

  - id: DART-SEC-013
    title: OS Command Injection via Process.run / Process.start
    message: >
      User-controlled input is passed directly to Process.run() or
      Process.start(). An attacker can inject arbitrary shell commands,
      leading to full system compromise.
    severity: CRITICAL
    metadata:
      cwe: CWE-78
      owasp: "A03:2021 – Injection"
      tags: [injection, command-injection, os]
    suggestion: >
      Never pass user input as the executable path. Use a fixed allowlist of
      commands and pass user data only as sanitized arguments, never as the
      command itself.
    pattern:
      regex: Process\.(run|start|runSync)\s*\(\s*\$\{?[a-zA-Z_]\w*\}?
    languages: [dart]

  - id: DART-SEC-014
    title: Server-Side Request Forgery (SSRF)
    message: >
      An HTTP request is made to a URL derived from user-controlled input.
      An attacker can redirect the request to internal services, cloud metadata
      endpoints, or other sensitive infrastructure.
    severity: CRITICAL
    metadata:
      cwe: CWE-918
      owasp: "A10:2021 – Server-Side Request Forgery"
      tags: [ssrf, network, injection]
    suggestion: >
      Validate the target URL against a strict allowlist of permitted domains
      before making the request. Never pass raw user input to http.get(),
      http.post(), or HttpClient.
    pattern:
      regex: (http\.(get|post|put|delete|patch)|HttpClient\(\)\.(get|open)Url)\s*\(\s*(Uri\.parse\s*\()?\s*\$\{?[a-zA-Z_]\w*\}?
    languages: [dart]