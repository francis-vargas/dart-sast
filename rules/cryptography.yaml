rules:
  - id: DART-SEC-003
    title: Weak Cryptographic Primitive
    message: >
      Usage of a broken or weak cryptographic algorithm (MD5, SHA-1, DES, RC4)
      was detected. These algorithms are considered cryptographically broken
      and must not be used for security-sensitive operations.
    severity: HIGH
    metadata:
      cwe: CWE-327
      owasp: "A02:2021 – Cryptographic Failures"
      tags: [crypto, weak-algorithm]
    suggestion: >
      Use SHA-256 or SHA-3 for hashing and AES-GCM / ChaCha20-Poly1305 for
      symmetric encryption.
    pattern:
      regex: \b(md5|sha1|sha-1|des\.encrypt|rc4|MD5|SHA1)\b
      flags: IGNORECASE
    languages: [dart]

  - id: DART-SEC-004
    title: Use of Cryptographically Insecure Randomness
    message: >
      dart:math Random() is a pseudo-random number generator (PRNG) and must
      NOT be used for security-sensitive purposes such as token generation,
      session IDs, or cryptographic keys.
    severity: HIGH
    metadata:
      cwe: CWE-338
      owasp: "A02:2021 – Cryptographic Failures"
      tags: [crypto, randomness, prng]
    suggestion: >
      Use dart:math Random.secure() or the pointycastle CSPRNG for all
      security contexts.
    pattern:
      regex: \bRandom\(\)
    languages: [dart]

  - id: DART-SEC-015
    title: AES ECB Mode Used
    message: >
      AES in ECB (Electronic Codebook) mode was detected. ECB mode encrypts
      each block independently, which leaks patterns in plaintext — identical
      plaintext blocks produce identical ciphertext blocks, making the
      encryption trivially breakable.
    severity: HIGH
    metadata:
      cwe: CWE-327
      owasp: "A02:2021 – Cryptographic Failures"
      tags: [crypto, aes, ecb, weak-mode]
    suggestion: >
      Replace ECB with AES-GCM (authenticated encryption) or AES-CBC with a
      random IV. Never reuse an IV. Consider the pointycastle package for
      proper cipher mode support.
    pattern:
      regex: (ECBBlockCipher\s*\(|BlockCipher\s*\(\s*['"]AES/ECB)
    languages: [dart]

  - id: DART-SEC-016
    title: JWT "none" Algorithm Accepted
    message: >
      The JWT algorithm is set to "none", which disables signature verification.
      Any attacker can forge a token by setting alg=none and removing the
      signature, bypassing all authentication checks.
    severity: CRITICAL
    metadata:
      cwe: CWE-347
      owasp: "A07:2021 – Identification and Authentication Failures"
      tags: [jwt, authentication, crypto]
    suggestion: >
      Explicitly reject tokens with alg=none. Always verify JWT signatures
      using a strong algorithm (RS256, ES256, or HS256 with a secret of
      sufficient entropy).
    pattern:
      regex: algorithm\s*:\s*['"]none['"]
      flags: IGNORECASE
    languages: [dart]